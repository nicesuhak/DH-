<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DH학원 · 학생 관리 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2430;
    --ink-soft:#3A4453;
    --muted:#6B7268;
    --paper:#EEF1EC;
    --paper-alt:#FFFFFF;
    --line:#D9DED2;
    --line-strong:#C3CABB;
    --accent-navy:#35507A;
    --accent-navy-deep:#22334F;
    --accent-teal:#2F6F5E;
    --accent-teal-soft:#E4EFEA;
    --accent-amber:#C98A3B;
    --accent-amber-soft:#F6EBDA;
    --accent-red:#B94B4B;
    --accent-red-soft:#F5E4E1;
    --radius-sm:4px;
    --radius-md:8px;
    --shadow-card:0 1px 2px rgba(27,36,48,0.06), 0 1px 0 rgba(27,36,48,0.04);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    font-feature-settings:'tnum' 1;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  h1,h2,h3{
    font-family:'Jua', sans-serif;
    color:var(--ink);
    margin:0;
  }

  button{font-family:inherit;}

  /* ---------- 레이아웃 ---------- */
  .app-shell{
    max-width:1180px;
    margin:0 auto;
    padding:0 24px 80px;
  }

  header.masthead{
    padding:40px 0 28px;
    border-bottom:2px solid var(--ink);
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
  }
  .masthead-title{
    display:flex;
    align-items:baseline;
    gap:12px;
  }
  .masthead-title .logo-mark{
    width:52px;
    height:52px;
    object-fit:contain;
    flex:none;
  }
  header.masthead h1{
    font-size:28px;
    font-weight:900;
    letter-spacing:-0.01em;
  }
  header.masthead .tagline{
    color:var(--muted);
    font-size:13px;
    margin-top:4px;
  }
  .masthead-date{
    font-size:13px;
    color:var(--muted);
    text-align:right;
  }

  /* ---------- 탭 네비게이션 ---------- */
  nav.tabs{
    display:flex;
    gap:4px;
    margin:28px 0 0;
    border-bottom:1px solid var(--line-strong);
  }
  nav.tabs button{
    background:none;
    border:none;
    padding:14px 20px 12px;
    font-size:15px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    border-bottom:3px solid transparent;
    margin-bottom:-1px;
    transition:color .15s ease;
    letter-spacing:-0.01em;
  }
  nav.tabs button:hover{color:var(--ink-soft);}
  nav.tabs button.active{
    color:var(--accent-navy-deep);
    border-bottom-color:var(--accent-navy-deep);
  }

  .tab-panel{display:none; padding-top:28px; animation:fadein .2s ease;}
  .tab-panel.active{display:block;}
  @keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- 요약 카드 ---------- */
  .summary-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:28px;
  }
  .summary-card{
    background:var(--paper-alt);
    border:1px solid var(--line);
    border-radius:var(--radius-md);
    padding:16px 18px;
    box-shadow:var(--shadow-card);
  }
  .summary-card .label{
    font-size:12px;
    color:var(--muted);
    font-weight:600;
    letter-spacing:.02em;
  }
  .summary-card .value{
    font-family:'Jua', sans-serif;
    font-size:26px;
    font-weight:700;
    margin-top:6px;
    color:var(--accent-navy-deep);
  }
  .summary-card .value.teal{color:var(--accent-teal);}
  .summary-card .value.amber{color:var(--accent-amber);}
  .summary-card .value.red{color:var(--accent-red);}

  /* ---------- 카드 / 패널 ---------- */
  .grid-2{
    display:grid;
    grid-template-columns:340px 1fr;
    gap:20px;
    align-items:start;
  }
  .card{
    background:var(--paper-alt);
    border:1px solid var(--line);
    border-radius:var(--radius-md);
    padding:22px;
    box-shadow:var(--shadow-card);
  }
  .card h2{
    font-size:17px;
    font-weight:700;
    margin-bottom:4px;
  }
  .card .card-sub{
    font-size:12.5px;
    color:var(--muted);
    margin-bottom:18px;
  }

  /* ---------- 폼 요소 ---------- */
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .field input[type=text],
  .field input[type=number],
  .field input[type=date],
  .field input[type=month],
  .field select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line-strong);
    border-radius:var(--radius-sm);
    font-size:14px;
    font-family:inherit;
    background:var(--paper-alt);
    color:var(--ink);
  }
  .field input:focus, .field select:focus{
    outline:2px solid var(--accent-navy);
    outline-offset:1px;
    border-color:var(--accent-navy);
  }
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:10px 18px;
    border-radius:var(--radius-sm);
    border:1px solid transparent;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:opacity .15s ease, transform .05s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--accent-navy-deep); color:#fff;}
  .btn-primary:hover{opacity:.9;}
  .btn-block{width:100%;}
  .btn-ghost{background:none; border:1px solid var(--line-strong); color:var(--ink-soft);}
  .btn-ghost:hover{background:var(--paper);}
  .btn-text{background:none; border:none; color:var(--accent-navy); font-weight:600; cursor:pointer; padding:4px 6px; font-size:13px;}
  .btn-text.danger{color:var(--accent-red);}
  .btn-text:hover{text-decoration:underline;}

  .status-btn-group{display:flex; gap:8px;}
  .status-btn{
    flex:1;
    padding:12px 6px;
    border-radius:var(--radius-sm);
    border:1.5px solid var(--line-strong);
    background:var(--paper-alt);
    cursor:pointer;
    text-align:center;
    font-weight:700;
    font-size:13px;
    color:var(--ink-soft);
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .status-btn .mark{font-family:'Jua', sans-serif; font-size:20px; line-height:1;}
  .status-btn[data-status="출석"].selected{border-color:var(--accent-teal); background:var(--accent-teal-soft); color:var(--accent-teal);}
  .status-btn[data-status="지각"].selected{border-color:var(--accent-amber); background:var(--accent-amber-soft); color:var(--accent-amber);}
  .status-btn[data-status="결석"].selected{border-color:var(--accent-red); background:var(--accent-red-soft); color:var(--accent-red);}

  /* ---------- 테이블 ---------- */
  table{width:100%; border-collapse:collapse;}
  thead th{
    text-align:left;
    font-size:11.5px;
    font-weight:700;
    color:var(--muted);
    letter-spacing:.03em;
    padding:0 10px 10px;
    border-bottom:1px solid var(--line-strong);
  }
  tbody td{
    padding:12px 10px;
    border-bottom:1px solid var(--line);
    font-size:14px;
    vertical-align:middle;
  }
  tbody tr:hover{background:rgba(53,80,122,0.035);}
  tbody tr:last-child td{border-bottom:none;}
  td.num{font-variant-numeric:tabular-nums;}

  .pill{
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:3px 10px;
    border-radius:100px;
    font-size:12.5px;
    font-weight:700;
  }
  .pill.출석{background:var(--accent-teal-soft); color:var(--accent-teal);}
  .pill.지각{background:var(--accent-amber-soft); color:var(--accent-amber);}
  .pill.결석{background:var(--accent-red-soft); color:var(--accent-red);}

  .empty-state{
    text-align:center;
    padding:48px 20px;
    color:var(--muted);
    font-size:14px;
  }
  .empty-state .big{
    font-family:'Jua', sans-serif;
    font-size:15px;
    color:var(--ink-soft);
    margin-bottom:6px;
    font-weight:700;
  }

  .divider-label{
    display:flex; align-items:center; gap:10px;
    color:var(--muted); font-size:12px; font-weight:700;
    margin:26px 0 14px;
  }
  .divider-label::before, .divider-label::after{content:""; flex:1; height:1px; background:var(--line-strong);}

  /* ---------- 학생 선택 칩 ---------- */
  .student-picker{
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;
  }
  .student-chip{
    padding:8px 14px;
    border:1.5px solid var(--line-strong);
    border-radius:100px;
    background:var(--paper-alt);
    font-size:13.5px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .student-chip.selected{
    background:var(--accent-navy-deep);
    border-color:var(--accent-navy-deep);
    color:#fff;
  }

  /* ---------- 출결 달력 (시그니처 요소) ---------- */
  .calendar-head{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
  }
  .calendar-head h3{font-size:15px; font-weight:700;}
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }
  .cal-dow{
    text-align:center;
    font-size:11px;
    font-weight:700;
    color:var(--muted);
    padding-bottom:4px;
  }
  .cal-cell{
    aspect-ratio:1/1;
    border:1px solid var(--line);
    border-radius:6px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    position:relative;
    background:var(--paper-alt);
  }
  .cal-cell.blank{border:none; background:transparent;}
  .cal-cell .daynum{
    position:absolute;
    top:3px; left:5px;
    font-size:9.5px;
    color:var(--muted);
    font-weight:600;
  }
  .cal-stamp{
    font-family:'Jua', sans-serif;
    font-size:19px;
    font-weight:900;
    line-height:1;
  }
  .cal-cell.출석 .cal-stamp{color:var(--accent-teal);}
  .cal-cell.지각 .cal-stamp{color:var(--accent-amber);}
  .cal-cell.결석 .cal-stamp{color:var(--accent-red);}
  .cal-legend{
    display:flex; gap:16px; margin-top:14px; font-size:12px; color:var(--muted); flex-wrap:wrap;
  }
  .cal-legend span{display:flex; align-items:center; gap:6px; font-weight:600;}
  .cal-legend .mk{font-family:'Jua', sans-serif; font-weight:900; font-size:14px;}

  .rate-bar-track{
    height:8px; background:var(--line); border-radius:6px; overflow:hidden; margin-top:6px;
  }
  .rate-bar-fill{height:100%; background:var(--accent-teal); border-radius:6px;}

  .score-bar-track{width:120px; height:6px; background:var(--line); border-radius:4px; overflow:hidden;}
  .score-bar-fill{height:100%; background:var(--accent-navy);}

  @media (max-width: 860px){
    .grid-2{grid-template-columns:1fr;}
    .summary-row{grid-template-columns:repeat(2,1fr);}
    .field-row{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion: reduce){
    .tab-panel{animation:none;}
  }
</style>
</head>

  <!-- ===================== 학생 명단 ===================== -->
  <section class="tab-panel active" id="panel-students">

    <div class="summary-row">
      <div class="summary-card">
        <div class="label">전체 학생 수</div>
        <div class="value" id="statTotalStudents">0명</div>
      </div>
      <div class="summary-card">
        <div class="label">오늘 출석 체크</div>
        <div class="value teal" id="statTodayAttendance">0건</div>
      </div>
      <div class="summary-card">
        <div class="label">전체 평균 출석률</div>
        <div class="value teal" id="statAvgAttendance">-</div>
      </div>
      <div class="summary-card">
        <div class="label">전체 평균 점수</div>
        <div class="value amber" id="statAvgScore">-</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>학생 등록</h2>
        <div class="card-sub">새로운 학생의 정보를 입력해주세요</div>
        <form id="studentForm">
          <div class="field">
            <label for="stuName">이름</label>
            <input type="text" id="stuName" placeholder="예: 김민준" required>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="stuGrade">학년</label>
              <select id="stuGrade" required>
                <option value="" disabled selected>선택</option>
                <option>초1</option><option>초2</option><option>초3</option>
                <option>초4</option><option>초5</option><option>초6</option>
                <option>중1</option><option>중2</option><option>중3</option>
                <option>고1</option><option>고2</option><option>고3</option>
              </select>
            </div>
            <div class="field">
              <label for="stuSchool">학교</label>
              <input type="text" id="stuSchool" placeholder="예: 대구중앙초" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="studentSubmitBtn">학생 등록</button>
        </form>
      </div>

      <div class="card">
        <h2>학생 명단</h2>
        <div class="card-sub">등록된 학생을 확인하고 관리하세요</div>
        <div id="studentTableWrap"></div>
      </div>
    </div>
  </section>

  <!-- ===================== 출결 관리 ===================== -->
  <section class="tab-panel" id="panel-attendance">
    <div id="attendanceEmptyGate"></div>
    <div id="attendanceContent" style="display:none;">
      <div class="divider-label">학생 선택</div>
      <div class="student-picker" id="attendanceStudentPicker"></div>

      <div class="grid-2">
        <div class="card">
          <h2>출결 기록하기</h2>
          <div class="card-sub" id="attFormSub">학생을 선택해주세요</div>
          <form id="attendanceForm">
            <div class="field">
              <label for="attDate">날짜</label>
              <input type="date" id="attDate" required>
            </div>
            <div class="field">
              <label>출결 상태</label>
              <div class="status-btn-group" id="statusBtnGroup">
                <div class="status-btn" data-status="출석"><span class="mark">○</span>출석</div>
                <div class="status-btn" data-status="지각"><span class="mark">△</span>지각</div>
                <div class="status-btn" data-status="결석"><span class="mark">✕</span>결석</div>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:6px;">기록 저장</button>
          </form>

          <div class="divider-label">이달의 출석률</div>
          <div>
            <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:700;">
              <span id="rateLabel">-</span>
              <span id="ratePercent" class="num">-</span>
            </div>
            <div class="rate-bar-track"><div class="rate-bar-fill" id="rateBarFill" style="width:0%;"></div></div>

        <div class="card">

            <h3 id="calendarTitle">출결 달력</h3>

          </div>
          <div class="cal-grid" id="calGrid"></div>
          <div class="cal-legend">
            <span><span class="mk" style="color:var(--accent-teal);">○</span> 출석</span>
            <span><span class="mk" style="color:var(--accent-amber);">△</span> 지각</span>
            <span><span class="mk" style="color:var(--accent-red);">✕</span> 결석</span>
          </div>

          <div class="divider-label">전체 출결 기록</div>
          <div id="attendanceHistoryWrap"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== 테스트 결과 ===================== -->
  <section class="tab-panel" id="panel-tests">

      <div class="grid-2">

              <select id="testStudent" required></select>

              <label for="testName">시험명</label>

            <div class="field-row">
              <div class="field">
                <label for="testDate">날짜</label>
                <input type="date" id="testDate" required>
              </div>
              <div class="field">
                <label for="testScore">점수</label>
                <input type="number" id="testScore" min="0" placeholder="0" required>

            <div class="field">
              <label for="testMax">만점</label>
              <input type="number" id="testMax" min="1" value="100" required>

          <div id="testTableWrap"></div>

    editingStudentId: null,
    selectedAttStudentId: null,
    selectedTestStudentId: null, // null = 전체
    selectedStatus: null,
    calMonth: null // 'YYYY-MM'
  };

  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

  function todayStr(){
    const d = new Date();
    return d.toISOString().slice(0,10);
  }
  function thisMonthStr(){
    return todayStr().slice(0,7);
  }
  state.calMonth = thisMonthStr();

  function fmtDateLabel(dateStr){
    const [y,m,d] = dateStr.split('-');
    return `${y}.${m}.${d}`;
  }

  /* ================= 초기화 ================= */
  function init(){
    $('#todayLabel').textContent = new Date().toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
    $('#attDate').value = todayStr();
    $('#testDate').value = todayStr();
    $('#calMonth').value = state.calMonth;

    bindTabs();
    bindStudentForm();
    bindAttendanceForm();
    bindTestForm();

    $('#calMonth').addEventListener('change', e => {
      state.calMonth = e.target.value || thisMonthStr();
      renderAttendanceTab();
    });

    renderAll();
  }

  /* ================= 탭 전환 ================= */
  function bindTabs(){
    $$('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        $$('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        $$('.tab-panel').forEach(p => p.classList.remove('active'));
        $('#panel-' + tab).classList.add('active');
        if(tab === 'attendance') renderAttendanceTab();
        if(tab === 'tests') renderTestsTab();
      });
    });
  }

  function renderAll(){
    renderStudentsTab();
    renderAttendanceTab();
    renderTestsTab();
    renderSummary();
  }

  /* ================= 요약 카드 ================= */
  function renderSummary(){
    $('#statTotalStudents').textContent = state.students.length + '명';
    const todayCount = state.attendance.filter(a => a.date === todayStr()).length;
    $('#statTodayAttendance').textContent = todayCount + '건';

    if(state.students.length === 0){
      $('#statAvgAttendance').textContent = '-';
      $('#statAvgScore').textContent = '-';
      return;
    }
    const rates = state.students.map(s => attendanceRate(s.id)).filter(r => r !== null);
    $('#statAvgAttendance').textContent = rates.length ? Math.round(rates.reduce((a,b)=>a+b,0)/rates.length) + '%' : '기록 없음';

    if(state.tests.length === 0){
      $('#statAvgScore').textContent = '기록 없음';
    } else {
      const pcts = state.tests.map(t => (t.score / t.max) * 100);
      $('#statAvgScore').textContent = Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length) + '점';
    }
  }

  /* ================= 학생 명단 탭 ================= */
  function bindStudentForm(){
    $('#studentForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = $('#stuName').value.trim();
      const grade = $('#stuGrade').value;
      const school = $('#stuSchool').value.trim();
      if(!name || !grade || !school) return;

      if(state.editingStudentId){
        const s = state.students.find(s => s.id === state.editingStudentId);
        s.name = name; s.grade = grade; s.school = school;
        state.editingStudentId = null;
        $('#studentSubmitBtn').textContent = '학생 등록';
      } else {
        state.students.push({
          id: state.nextId.student++,
          name, grade, school,
          createdAt: todayStr()
        });
      }
      e.target.reset();
      $('#stuGrade').selectedIndex = 0;
      renderAll();
    });
  }

  function renderStudentsTab(){
    const wrap = $('#studentTableWrap');
    if(state.students.length === 0){
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="big">등록된 학생이 없습니다</div>
          왼쪽 양식으로 첫 학생을 등록해보세요.
        </div>`;
      return;
    }
    const rows = state.students.map(s => {
      const rate = attendanceRate(s.id);
      return `
        <tr>
          <td>${escapeHtml(s.name)}</td>
          <td>${escapeHtml(s.grade)}</td>
          <td>${escapeHtml(s.school)}</td>
          <td class="num">${rate === null ? '기록 없음' : rate + '%'}</td>
          <td>
            <button class="btn-text" data-edit="${s.id}">수정</button>
            <button class="btn-text danger" data-del="${s.id}">삭제</button>
          </td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table>
        <thead><tr><th>이름</th><th>학년</th><th>학교</th><th>출석률</th><th>관리</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    $$('[data-edit]', wrap).forEach(btn => btn.addEventListener('click', () => startEditStudent(+btn.dataset.edit)));
    $$('[data-del]', wrap).forEach(btn => btn.addEventListener('click', () => deleteStudent(+btn.dataset.del)));
  }

  function startEditStudent(id){
    const s = state.students.find(s => s.id === id);
    if(!s) return;
    state.editingStudentId = id;
    $('#stuName').value = s.name;
    $('#stuGrade').value = s.grade;
    $('#stuSchool').value = s.school;
    $('#studentSubmitBtn').textContent = '수정 내용 저장';
    $('#stuName').focus();
  }

  function deleteStudent(id){
    if(!confirm('이 학생의 정보와 출결·성적 기록이 모두 삭제됩니다. 계속할까요?')) return;
    state.students = state.students.filter(s => s.id !== id);
    state.attendance = state.attendance.filter(a => a.studentId !== id);
    state.tests = state.tests.filter(t => t.studentId !== id);
    if(state.selectedAttStudentId === id) state.selectedAttStudentId = null;
    if(state.selectedTestStudentId === id) state.selectedTestStudentId = null;
    renderAll();
  }

  /* ================= 출결 관리 탭 ================= */
  function bindAttendanceForm(){
    $('#statusBtnGroup').addEventListener('click', e => {
      const btn = e.target.closest('.status-btn');
      if(!btn) return;
      state.selectedStatus = btn.dataset.status;
      $$('.status-btn', $('#statusBtnGroup')).forEach(b => b.classList.toggle('selected', b === btn));
    });

    $('#attendanceForm').addEventListener('submit', e => {
      e.preventDefault();
      if(!state.selectedAttStudentId){ alert('학생을 먼저 선택해주세요.'); return; }
      if(!state.selectedStatus){ alert('출결 상태를 선택해주세요.'); return; }
      const date = $('#attDate').value;
      if(!date) return;

      const existing = state.attendance.find(a => a.studentId === state.selectedAttStudentId && a.date === date);
      if(existing){
        existing.status = state.selectedStatus;
      } else {
        state.attendance.push({
          id: state.nextId.attendance++,
          studentId: state.selectedAttStudentId,
          date,
          status: state.selectedStatus
        });
      }
      renderAll();
    });
  }

  function renderAttendanceTab(){
    if(state.students.length === 0){
      $('#attendanceEmptyGate').innerHTML = `
        <div class="card"><div class="empty-state">
          <div class="big">먼저 학생을 등록해주세요</div>
          '학생 명단' 탭에서 학생을 등록하면 출결을 기록할 수 있어요.
        </div></div>`;
      $('#attendanceContent').style.display = 'none';
      return;
    }
    $('#attendanceEmptyGate').innerHTML = '';
    $('#attendanceContent').style.display = '';

    if(!state.selectedAttStudentId || !state.students.find(s=>s.id===state.selectedAttStudentId)){
      state.selectedAttStudentId = state.students[0].id;
    }

    // 학생 선택 칩
    $('#attendanceStudentPicker').innerHTML = state.students.map(s => `
      <div class="student-chip ${s.id===state.selectedAttStudentId?'selected':''}" data-pick="${s.id}">${escapeHtml(s.name)} · ${escapeHtml(s.grade)}</div>
    `).join('');
    $$('[data-pick]', $('#attendanceStudentPicker')).forEach(chip => {
      chip.addEventListener('click', () => {
        state.selectedAttStudentId = +chip.dataset.pick;
        renderAttendanceTab();
      });
    });

    const student = state.students.find(s => s.id === state.selectedAttStudentId);
    $('#attFormSub').textContent = `${student.name} 학생의 출결을 기록합니다`;
    $('#calendarTitle').textContent = `${student.name} 학생 출결 달력`;

    // 상태 버튼: 오늘 날짜 기록 있으면 반영
    const dateVal = $('#attDate').value || todayStr();
    const todays = state.attendance.find(a => a.studentId === student.id && a.date === dateVal);
    state.selectedStatus = todays ? todays.status : null;
    $$('.status-btn', $('#statusBtnGroup')).forEach(b => b.classList.toggle('selected', todays && b.dataset.status === todays.status));

    // 날짜 변경 시 상태 버튼 갱신
    $('#attDate').onchange = () => {
      const d = $('#attDate').value;
      const rec = state.attendance.find(a => a.studentId === student.id && a.date === d);
      state.selectedStatus = rec ? rec.status : null;
      $$('.status-btn', $('#statusBtnGroup')).forEach(b => b.classList.toggle('selected', rec && b.dataset.status === rec.status));
    };

    // 출석률
    const rate = attendanceRate(student.id);
    const records = state.attendance.filter(a => a.studentId === student.id);
    $('#rateLabel').textContent = `총 ${records.length}회 기록`;
    $('#ratePercent').textContent = rate === null ? '기록 없음' : rate + '%';
    $('#rateBarFill').style.width = (rate || 0) + '%';

    renderCalendar(student.id);
    renderAttendanceHistory(student.id);
  }

  function renderCalendar(studentId){
    const [y,m] = state.calMonth.split('-').map(Number);
    const firstDay = new Date(y, m-1, 1);
    const startWeekday = firstDay.getDay(); // 0=일
    const daysInMonth = new Date(y, m, 0).getDate();

    const dowLabels = ['일','월','화','수','목','금','토'];
    let html = dowLabels.map(d => `<div class="cal-dow">${d}</div>`).join('');

    for(let i=0;i<startWeekday;i++) html += `<div class="cal-cell blank"></div>`;

    const marks = {출석:'○', 지각:'△', 결석:'✕'};
    for(let day=1; day<=daysInMonth; day++){
      const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const rec = state.attendance.find(a => a.studentId === studentId && a.date === dateStr);
      const statusClass = rec ? rec.status : '';
      html += `<div class="cal-cell ${statusClass}">
          <span class="daynum">${day}</span>
          ${rec ? `<span class="cal-stamp">${marks[rec.status]}</span>` : ''}
        </div>`;
    }
    $('#calGrid').innerHTML = html;
  }

  function renderAttendanceHistory(studentId){
    const records = state.attendance
      .filter(a => a.studentId === studentId)
      .sort((a,b) => b.date.localeCompare(a.date));

    const wrap = $('#attendanceHistoryWrap');
    if(records.length === 0){
      wrap.innerHTML = `<div class="empty-state">아직 출결 기록이 없습니다.</div>`;
      return;
    }
    const rows = records.map(r => `
      <tr>
        <td>${fmtDateLabel(r.date)}</td>
        <td><span class="pill ${r.status}">${r.status}</span></td>
        <td><button class="btn-text danger" data-delatt="${r.id}">삭제</button></td>
      </tr>`).join('');

    wrap.innerHTML = `
      <table>
        <thead><tr><th>날짜</th><th>상태</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    $$('[data-delatt]', wrap).forEach(btn => btn.addEventListener('click', () => {
      state.attendance = state.attendance.filter(a => a.id !== +btn.dataset.delatt);
      renderAll();
    }));
  }

  function attendanceRate(studentId){
    const records = state.attendance.filter(a => a.studentId === studentId);
    if(records.length === 0) return null;
    const present = records.filter(a => a.status === '출석').length;
    return Math.round((present / records.length) * 100);
  }

  /* ================= 테스트 결과 탭 ================= */
  function bindTestForm(){
    $('#testForm').addEventListener('submit', e => {
      e.preventDefault();
      const studentId = +$('#testStudent').value;
      const testName = $('#testName').value.trim();
      const date = $('#testDate').value;
      const score = Number($('#testScore').value);
      const max = Number($('#testMax').value);
      if(!studentId || !testName || !date || Number.isNaN(score) || Number.isNaN(max) || max <= 0) return;
      if(score > max){ alert('점수가 만점보다 클 수 없습니다.'); return; }

      state.tests.push({
        id: state.nextId.test++,
        studentId, testName, date, score, max
      });
      e.target.reset();
      $('#testDate').value = todayStr();
      $('#testMax').value = 100;
      renderAll();
    });
  }

  function renderTestsTab(){
    if(state.students.length === 0){
      $('#testsEmptyGate').innerHTML = `
        <div class="card"><div class="empty-state">
          <div class="big">먼저 학생을 등록해주세요</div>
          '학생 명단' 탭에서 학생을 등록하면 테스트 결과를 기록할 수 있어요.
        </div></div>`;
      $('#testsContent').style.display = 'none';
      return;
    }
    $('#testsEmptyGate').innerHTML = '';
    $('#testsContent').style.display = '';

    // 학생 선택 select
    const options = state.students.map(s => `<option value="${s.id}">${escapeHtml(s.name)} · ${escapeHtml(s.grade)}</option>`).join('');
    const prevVal = $('#testStudent').value;
    $('#testStudent').innerHTML = options;
    if(prevVal && state.students.find(s => s.id === +prevVal)) $('#testStudent').value = prevVal;

    // 필터 칩 (전체 + 학생별)
    const chips = [`<div class="student-chip ${state.selectedTestStudentId===null?'selected':''}" data-pick="all">전체</div>`]
      .concat(state.students.map(s => `<div class="student-chip ${state.selectedTestStudentId===s.id?'selected':''}" data-pick="${s.id}">${escapeHtml(s.name)}</div>`));
    $('#testStudentPicker').innerHTML = chips.join('');
    $$('[data-pick]', $('#testStudentPicker')).forEach(chip => {
      chip.addEventListener('click', () => {
        state.selectedTestStudentId = chip.dataset.pick === 'all' ? null : +chip.dataset.pick;
        renderTestsTab();
      });
    });

    renderTestList();
  }

  function renderTestList(){
    let list = state.tests.slice().sort((a,b) => b.date.localeCompare(a.date));
    if(state.selectedTestStudentId !== null){
      list = list.filter(t => t.studentId === state.selectedTestStudentId);
    }

    const wrap = $('#testTableWrap');
    if(list.length === 0){
      wrap.innerHTML = `<div class="empty-state">아직 등록된 테스트 결과가 없습니다.</div>`;
      return;
    }

    const rows = list.map(t => {
      const s = state.students.find(s => s.id === t.studentId);
      const pct = Math.round((t.score / t.max) * 100);
      return `
        <tr>
          <td>${escapeHtml(s ? s.name : '삭제된 학생')}</td>
          <td>${escapeHtml(t.testName)}</td>
          <td>${fmtDateLabel(t.date)}</td>
          <td class="num">${t.score} / ${t.max}</td>
          <td>
            <div style="display:flex; align-items:center; gap:8px;">
              <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;"></div></div>
              <span class="num" style="font-size:12.5px; color:var(--muted); min-width:32px;">${pct}%</span>
            </div>
          </td>
          <td><button class="btn-text danger" data-deltest="${t.id}">삭제</button></td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table>
        <thead><tr><th>학생</th><th>시험명</th><th>날짜</th><th>점수</th><th>백분율</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    $$('[data-deltest]', wrap).forEach(btn => btn.addEventListener('click', () => {
      state.tests = state.tests.filter(t => t.id !== +btn.dataset.deltest);
      renderAll();
    }));
  }

  /* ================= 유틸 ================= */
  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  init();
})();
</script>
</body>
</html>
